name: Sync YouTube and deploy

on:
  schedule:
    # 09:15 UTC = 06:15 America/Sao_Paulo
    - cron: '15 9 * * 2,4,6'
  workflow_dispatch:

concurrency:
  group: linktree-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build current content
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 46.202.145.2 >> ~/.ssh/known_hosts

      - name: Deploy static build
        run: |
          rsync -az --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_ed25519" \
            dist/ \
            u150185510@46.202.145.2:/home/u150185510/domains/emcasacomcecilia.com/public_html/link/

      - name: Check production
        run: curl --fail --silent --show-error --retry 5 https://link.emcasacomcecilia.com/ > /dev/null
