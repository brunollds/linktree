name: Sync YouTube and deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 09:15 UTC = 06:15 America/Sao_Paulo
    - cron: '15 9 * * 2,4,6'
  workflow_dispatch:

concurrency:
  group: linktree-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build current content
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "::error::Secret HOSTINGER_SSH_PRIVATE_KEY_B64 is missing."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null; then
            echo "::error::HOSTINGER_SSH_PRIVATE_KEY_B64 did not decode to a valid private key."
            exit 1
          fi

      - name: Test SSH connection
        run: |
          ssh \
            -p 65002 \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            u150185510@46.202.145.2 \
            "test -d /home/u150185510/domains/emcasacomcecilia.com/public_html/link"

      - name: Deploy static build
        run: |
          rsync -az --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" \
            dist/ \
            u150185510@46.202.145.2:/home/u150185510/domains/emcasacomcecilia.com/public_html/link/

      - name: Check production
        run: curl --fail --silent --show-error --retry 5 https://link.emcasacomcecilia.com/ > /dev/null
